<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gamestudio</title>
</head>
<body>

    <h1>Our favorite games</h1>
    <ol>
        <li><a href="/pegsolitaire">Peg Solitaire</a></li>
    </ol>
    <span th:if="${@userController.logged}">
    Logged in as: <span th:text="${@userController.loggedUser.login}"/><br/>
</span>
    <a th:if="${@userController.logged}" href="/logout">Log out</a><br/>
    <form th:if="not ${@userController.logged}" action="/login" method="post">
        Login: <input type="text" name="login"/><br/>
        Password: <input type="password" name="password"/><br/>
        <input type="submit"/>
    </form>

</body>
</html>
